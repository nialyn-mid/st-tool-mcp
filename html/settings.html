<div id="mcp-hub-settings" class="example_extension_settings">
    <div class="inline-adviser">
        <div class="setup_section">
            <div class="section_title">
                MCP Tool Hub
            </div>
            
            <div class="settings_row">
                <label for="mcp-hub-log-level">Log Level</label>
                <select id="mcp-hub-log-level" class="text_pole">
                    <option value="0">Error</option>
                    <option value="1">Warn</option>
                    <option value="2">Info</option>
                    <option value="3">Debug</option>
                </select>
                <small>Controls the verbosity of console logs for the MCP Hub.</small>
            </div>
        </div>
    </div>
</div>
